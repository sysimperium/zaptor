<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapTor 2.0 | Central de Atendimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; opacity: 0.06; position: absolute; inset: 0; z-index: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden">
    
    <!-- Login Screen -->
    <div id="login-screen" class="z-20 bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transform transition-all">
        <div class="mb-6 flex justify-center">
            <div class="bg-green-500 p-4 rounded-full text-white text-4xl shadow-lg">⚡</div>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">ZapTor</h1>
        <p class="text-gray-500 mb-8">Identifique-se para entrar</p>
        <input type="text" id="username" placeholder="Seu Nome ou Setor" class="w-full p-4 border border-gray-200 rounded-xl mb-4 focus:ring-2 focus:ring-green-400 outline-none transition-all">
        <button onclick="login()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl transition-all shadow-md">Entrar</button>
    </div>

    <!-- Main Chat UI -->
    <div id="chat-screen" class="hidden z-10 w-full h-full flex flex-row max-w-[1600px] md:h-[95%] bg-white md:rounded-2xl shadow-2xl overflow-hidden">
        
        <!-- Sidebar: Lista de Conversas -->
        <div class="w-1/3 md:w-96 bg-gray-50 border-r flex flex-col shrink-0">
            <div class="p-4 bg-white border-b flex justify-between items-center">
                <span class="font-bold text-xl text-green-600">ZapTor 2.0</span>
                <span id="status-badge" class="px-2 py-1 bg-gray-200 text-gray-500 text-[9px] font-bold rounded-full uppercase">...</span>
            </div>

            <!-- Container do QR Code (Só aparece se deslogado) -->
            <div id="qr-container" class="hidden p-4 text-center border-b bg-orange-50">
                <div id="qr-code" class="bg-white p-2 rounded shadow-inner inline-block"></div>
                <p class="text-[10px] text-orange-600 mt-2 font-bold">ESCANEIE PARA CONECTAR</p>
            </div>

            <!-- Lista de Chats -->
            <div id="chat-list" class="flex-1 overflow-y-auto custom-scrollbar">
                <p class="p-8 text-center text-gray-400 text-sm">Carregando conversas...</p>
            </div>

            <div class="p-4 bg-white border-t text-xs">
                <p class="text-gray-400">Operador: <b id="display-user" class="text-gray-600"></b></p>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col relative bg-[#efeae2]">
            <div class="chat-bg"></div>
            
            <!-- Header do Chat Ativo -->
            <div id="chat-header" class="bg-white p-4 border-b z-10 hidden">
                <h2 id="active-chat-name" class="font-bold text-gray-800"></h2>
                <p id="active-chat-id" class="text-[10px] text-gray-400"></p>
            </div>

            <!-- Mensagens -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-3 z-10 custom-scrollbar">
                <div class="flex items-center justify-center h-full">
                    <p class="bg-white/80 p-4 rounded-2xl text-gray-500 text-sm shadow-sm">Selecione uma conversa ao lado para começar.</p>
                </div>
            </div>
            
            <!-- Input (Só aparece se houver chat ativo) -->
            <div id="input-area" class="p-4 bg-gray-100 border-t z-10 hidden">
                <form id="message-form" class="flex space-x-2">
                    <input type="text" id="msg-input" placeholder="Digite sua mensagem..." class="flex-1 p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-400 outline-none">
                    <button type="submit" class="bg-green-500 text-white px-6 rounded-xl font-bold hover:bg-green-600 transition-all">Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const BACKEND_URL = "https://zaptor.onrender.com"; 
        let socket, currentUser = "", activeChatId = "";

        function login() {
            const user = document.querySelector("#username").value;
            if(!user) return;
            currentUser = user;
            document.querySelector("#display-user").innerText = user;
            document.querySelector("#login-screen").classList.add("hidden");
            document.querySelector("#chat-screen").classList.remove("hidden");
            initSocket();
        }

        function initSocket() {
            socket = io(BACKEND_URL);

            socket.on('whatsapp_status', (data) => {
                const badge = document.querySelector("#status-badge");
                if(data.ready) {
                    badge.innerText = "ONLINE";
                    badge.className = "px-2 py-1 bg-green-500 text-white text-[9px] font-bold rounded-full";
                    document.querySelector("#qr-container").classList.add("hidden");
                    loadChatList();
                } else {
                    badge.innerText = "AGUARDANDO";
                    badge.className = "px-2 py-1 bg-orange-400 text-white text-[9px] font-bold rounded-full";
                    if(data.qr) showQR(data.qr);
                }
            });

            socket.on('whatsapp_qr', (qr) => showQR(qr));
            socket.on('whatsapp_message', (msg) => {
                if(msg.chatId === activeChatId) renderMessage(msg);
                loadChatList(); // Atualiza a lista para mostrar a última msg
            });
        }

        async function loadChatList() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/chats`);
                const chats = await res.json();
                const list = document.querySelector("#chat-list");
                list.innerHTML = chats.map(chat => `
                    <div onclick="selectChat('${chat.id}', '${chat.name}')" class="p-4 border-b hover:bg-white cursor-pointer transition-all ${activeChatId === chat.id ? 'bg-white border-l-4 border-l-green-500' : ''}">
                        <div class="flex justify-between items-center">
                            <b class="text-sm text-gray-700 truncate">${chat.name || 'Sem Nome'}</b>
                            ${chat.unreadCount > 0 ? `<span class="bg-green-500 text-white text-[10px] px-1.5 rounded-full">${chat.unreadCount}</span>` : ''}
                        </div>
                        <p class="text-[10px] text-gray-400 truncate mt-1">${chat.id}</p>
                    </div>
                `).join('');
            } catch(e) { console.error("Erro ao carregar chats", e); }
        }

        async function selectChat(id, name) {
            activeChatId = id;
            document.querySelector("#chat-header").classList.remove("hidden");
            document.querySelector("#input-area").classList.remove("hidden");
            document.querySelector("#active-chat-name").innerText = name;
            document.querySelector("#active-chat-id").innerText = id;
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/chats/${encodeURIComponent(id)}/messages`);
                const msgs = await res.json();
                const container = document.querySelector("#messages-container");
                container.innerHTML = "";
                msgs.forEach(renderMessage);
                loadChatList(); // Atualiza destaque na lista
            } catch(e) { console.error("Erro ao carregar mensagens", e); }
        }

        function renderMessage(msg) {
            const container = document.querySelector("#messages-container");
            const div = document.createElement("div");
            div.className = `flex ${msg.fromMe ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="${msg.fromMe ? 'bg-[#dcf8c6]' : 'bg-white'} p-2.5 rounded-2xl shadow-sm max-w-[85%] border border-black/5">
                    <p class="text-[14px] text-gray-800">${msg.body}</p>
                    <p class="text-[9px] text-gray-400 text-right mt-1">${new Date(msg.timestamp * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showQR(qr) {
            document.querySelector("#qr-container").classList.remove("hidden");
            const qrDiv = document.querySelector("#qr-code");
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: qr, width: 140, height: 140 });
        }

        document.querySelector("#message-form").onsubmit = (e) => {
            e.preventDefault();
            const input = document.querySelector("#msg-input");
            if(!input.value.trim() || !activeChatId) return;

            socket.emit('send_message', {
                loginName: currentUser,
                chatId: activeChatId,
                text: input.value
            });
            input.value = "";
        };
    </script>
</body>
</html>
